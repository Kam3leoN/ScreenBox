# EmulationStation config files path
home=.\.emulationstation

# Root of the ScreenBox bundle (parent of emulationstation). Optional explicit line:
# screenbox=..\
# Legacy equivalent still supported by EmulatorLauncher: retrobat=..\

# RetroArch / shared folders (relative to emulationstation folder)
bios=.\..\bios
saves=.\..\saves
screenshots=.\..\screenshots
shaders=.\..\system\shaders
videofilters=.\..\emulators\retroarch\filters\video
decorations=.\..\decorations
system.decorations=.\..\system\decorations
retroachievementsounds=.\..\sounds\retroachievements
